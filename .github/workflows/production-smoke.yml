name: Production Smoke

# Runs scripts/smoke.mjs against the live deployment on a schedule, so
# regressions on launch invariants (security headers, canonical/og:url canon,
# dead-slug 404s, cache-free service worker) are caught within hours instead
# of at the next manual run. The harness is dependency-free — no install step.
# See docs/runbooks/smoke-checks.md.

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Deployment URL to smoke-check'
        required: false
        default: 'https://sweepza.com'

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Run smoke checks
        env:
          BASE_URL: ${{ inputs.base_url || 'https://sweepza.com' }}
        run: node scripts/smoke.mjs "$BASE_URL"

      - name: File an ops issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Production smoke checks failing";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Scheduled production smoke checks failed: ${runUrl}`,
              "",
              "Reproduce locally with `pnpm ops:smoke https://sweepza.com`.",
              "Triage guide: `docs/runbooks/smoke-checks.md`.",
            ].join("\n");
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const existing = open.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
